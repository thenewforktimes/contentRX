name: Calibration log (weekly Monday)

# Phase C4 — weekly cron for the calibration log generator. Runs
# `reports/calibration/generate.py` every Monday afternoon UTC and
# opens a PR with that week's `reports/calibration/YYYY-WW.md`.
#
# The Monday-afternoon timing matches the architecture doc's spec
# (the docs site picks up the file on next deploy). Decoupling
# generation from publication via PR keeps the founder publication
# gate at /admin/reports intact.

on:
  schedule:
    # Monday 14:00 UTC. Friday-close + weekend trail give the override
    # stream + refinement-log activity time to settle before the log
    # consolidates them.
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: calibration-log-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: regenerate this week's calibration log
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Run calibration generator
        run: python3 reports/calibration/generate.py

      - name: Open PR if log changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/calibration-log
          commit-message: "chore(reports): weekly calibration log"
          title: "chore(reports): weekly calibration log"
          body: |
            Auto-generated by `.github/workflows/calibration_log.yml`.

            Runs `reports/calibration/generate.py` and writes the
            week's `reports/calibration/YYYY-WW.md`. The file is the
            public artifact the docs site renders weekly.

            Approve to publish; close to drop the run. `/admin/reports`
            is the founder-side preview gate.
          labels: |
            reports
            calibration
            auto-generated
          delete-branch: true
