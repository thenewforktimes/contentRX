name: Database backup (daily)

# Daily pg_dump of the production Supabase database into a workflow
# artifact. Caps worst-case data loss at 24 hours until ContentRX has
# enough revenue to justify a Supabase Pro plan with proper PITR.
#
# Setup (one-time, founder):
#
#   1. In Supabase Dashboard → Project Settings → Database, copy the
#      **direct connection** URI (port 5432, NOT the pooler on 6543).
#      pg_dump doesn't work through pgbouncer (the transaction pooler
#      multiplexes statements across backends in ways that break
#      pg_dump's session-level state).
#
#   2. Add it as a GitHub Actions secret named `DATABASE_DIRECT_URL`:
#         gh secret set DATABASE_DIRECT_URL --repo thenewforktimes/ContentRX
#         (paste the URI at the prompt)
#
#   3. First run: trigger manually via the Actions tab on GitHub
#      (workflow_dispatch) so you can confirm the dump succeeds before
#      relying on the daily cron.
#
# Retention: GitHub Actions artifacts default to 90 days, set
# explicitly below. For longer-term archive, download the artifact
# manually and stash in 1Password / private S3 monthly.
#
# Recovery (worst case — Supabase project gone):
#
#   1. Provision a new Supabase project, copy its connection URI
#   2. gunzip the latest backup artifact → `restore.sql`
#   3. psql "<new-uri>" -f restore.sql
#   4. Update DATABASE_URL in Vercel, redeploy
#
# Limitations (consciously accepted):
#   - Dump runs from a GitHub-hosted IP, not your Mac. The Supabase
#     direct connection must allow GitHub Actions' IP range. Supabase's
#     default config allows all IPs unless you've enabled the network
#     allowlist; if you do enable it, add `0.0.0.0/0` for this workflow
#     or move backup to a self-hosted runner.
#   - Plaintext SQL in the artifact. The repo is private so only
#     collaborators with read access can download. If this repo ever
#     goes public-with-history, move the artifact to encrypted storage
#     before the visibility flip.
#   - No backup verification (a successful pg_dump doesn't prove the
#     dump is restorable). Periodically test restore into a scratch
#     Supabase project — quarterly is plenty at this stage.

on:
  schedule:
    # 09:00 UTC daily — early morning west coast, off-peak for any
    # admin work, before the 16:00 UTC working hours start.
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: db-backup-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install Postgres 16 client
        # Supabase runs Postgres 15+; the v16 client is backward-
        # compatible and gets us recent pg_dump features. Default
        # ubuntu-latest ships with v14 client which is too old.
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt jammy-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-16

      - name: Compute artifact name
        id: name
        run: |
          # Date stamp gives us "contentrx-backup-2026-05-11.sql.gz" so
          # listing artifacts in the GitHub UI sorts chronologically.
          echo "filename=contentrx-backup-$(date -u +%Y-%m-%d).sql.gz" >> "$GITHUB_OUTPUT"

      - name: Run pg_dump
        env:
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          # `pipefail` makes the pipeline exit with the first non-zero
          # status, not just gzip's. Without it, pg_dump can fail
          # silently and gzip produces an empty 20-byte file that
          # downstream "did it succeed?" checks miss. `errexit` exits
          # on any non-zero command. `nounset` catches typos.
          set -euo pipefail

          if [ -z "${DATABASE_DIRECT_URL:-}" ]; then
            echo "::error::DATABASE_DIRECT_URL secret is not set. See workflow file header for setup instructions."
            exit 1
          fi

          # --no-owner --no-acl: portability — the restore-side role
          # may not match the source-side owner names; let the new DB
          # assign ownership during restore.
          # --clean --if-exists: emit DROP-IF-EXISTS before CREATE so
          # the dump is replay-safe against a non-empty target.
          # --quote-all-identifiers: defensive against future Postgres
          # keyword reservations on column names.
          # --verbose: pg_dump emits per-object progress to stderr.
          # GitHub Actions surfaces stderr in the step log, so a real
          # connection error (FATAL: password authentication failed,
          # could not translate host name, etc.) shows up loud and
          # near the top of the failed run.
          pg_dump "$DATABASE_DIRECT_URL" \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            --quote-all-identifiers \
            --verbose \
            | gzip --best > "${{ steps.name.outputs.filename }}"

      - name: Verify dump is non-empty
        run: |
          # Sanity check: a dump < 1 KB is almost certainly a silent
          # failure (auth issue, empty tables, etc.). Real production
          # dumps with even a few rows are 10+ KB.
          size=$(stat -c%s "${{ steps.name.outputs.filename }}")
          echo "Dump size: ${size} bytes"
          if [ "$size" -lt 1024 ]; then
            echo "::error::Dump is suspiciously small (${size} bytes < 1 KB). Investigate before relying on this backup."
            exit 1
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ steps.name.outputs.filename }}
          path: ${{ steps.name.outputs.filename }}
          retention-days: 90
          # if-no-files-found defaults to "warn" which would silently
          # succeed if pg_dump errored before writing the file.
          if-no-files-found: error
