name: Pseudonymize cancelled accounts (nightly)

# PR-31 — 90-day retention pass. Hits POST /api/cron/pseudonymize-cancelled
# nightly. The endpoint is a no-op when no cancelled users have crossed
# the 90-day floor; it bounds work to MAX_USERS_PER_RUN per invocation
# so a backlog drains gradually rather than in one giant transaction.
#
# Auth: CRON_SECRET bearer; the same secret used by other cron POST
# endpoints in this repo.

on:
  schedule:
    # 03:30 UTC nightly. Offset from 03:00 (rollback-monitor) so DB
    # contention stays bounded.
    - cron: "30 3 * * *"
  workflow_dispatch:

concurrency:
  group: pseudonymize-cancelled
  cancel-in-progress: false

jobs:
  pseudonymize:
    name: Pseudonymize cancelled accounts past 90 days
    runs-on: ubuntu-latest
    steps:
      - name: POST cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail
          : "${CRON_SECRET:?CRON_SECRET secret missing}"
          : "${APP_URL:?APP_URL secret missing}"
          response=$(curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/pseudonymize-cancelled")
          echo "Response: ${response}"
