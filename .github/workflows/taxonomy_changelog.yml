name: Taxonomy changelog gate

# Human-eval build plan Session 23 — enforces that any PR editing the
# taxonomy (standards_library.json, moments.py, moments_taxonomy.json)
# either appends a version_history entry, adds an Approved refinement
# to taxonomy_refinement_log.md, or explicitly opts out with a
# `changelog-skip:` commit prefix.
#
# The `/model/changelog` page on docs.contentrx.io reads those entries
# verbatim — an unchronicled taxonomy change breaks the transparency
# commitment to users.

on:
  pull_request:
    paths:
      - "src/content_checker/standards/standards_library.json"
      - "src/content_checker/standards/moments_taxonomy.json"
      - "src/content_checker/moments.py"
      - "taxonomy_refinement_log.md"
      - "scripts/check_taxonomy_changelog.py"
      - ".github/workflows/taxonomy_changelog.yml"

concurrency:
  group: taxonomy-changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: taxonomy changelog entry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the check can walk every commit from base..head.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce changelog entry
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/check_taxonomy_changelog.py
