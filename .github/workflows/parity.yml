name: JS/Python preprocessor parity

# Runs three parity gates on every PR and every push to main:
#
#   1. `tools/parity_check.py` — JS preprocessor (figma-plugin/ui.html)
#      vs. Python preprocessor (src/content_checker/preprocess.py).
#      v2 Session 2 deliverable.
#
#   2. `scripts/check-display-labels-parity.py` — DISPLAY_LABELS map
#      mirrored across four packages (engine, MCP, CLI, web TS). Fails
#      if any sibling drifts from the engine canonical.
#
#   3. `scripts/check-humanize-parity.py` — humanize_verdict /
#      humanize_severity / humanize_review_reason behavioral parity
#      across cli-client, mcp-server, lsp-server, github-action.
#      Compares outputs across 36 input cases per function rather
#      than byte-identity (docstrings legitimately diverge per
#      package).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast-follow push doesn't
# burn minutes on the prior commit.
concurrency:
  group: parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        # The parity check only needs the engine package itself —
        # no Anthropic SDK, no test extras. Editable install keeps the
        # JSON standards loader pointed at the in-tree library.
        run: pip install -e .

      - name: Fetch substrate
        # parity_check.py loads the standards library to drive the
        # preprocessor comparison. Substrate lives in a private repo
        # per ADR 2026-04-25; the script is the same one Vercel runs
        # in `prebuild` (package.json).
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run preprocessor parity gate
        run: python3 tools/parity_check.py

      - name: Run display-labels parity gate
        # No substrate or pip deps needed — pure regex parse over the
        # four DISPLAY_LABELS sources. Always runs, even if the
        # preprocessor gate is itself skipped.
        run: python3 scripts/check-display-labels-parity.py

      - name: Run humanize parity gate
        # Behavioral, not byte-identity: each package has its own
        # docstrings around the same three functions. The script
        # importlib-loads each humanize.py as an isolated module
        # and asserts they return identical outputs across 36 input
        # cases × 3 functions. Stdlib only.
        run: python3 scripts/check-humanize-parity.py
