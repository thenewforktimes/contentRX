name: JS/Python parity

# Runs three parity gates on every PR and every push to main:
#
#   1. `scripts/check-display-labels-parity.py` — DISPLAY_LABELS map
#      mirrored across three packages (engine, MCP, web TS). Fails
#      if any sibling drifts from the engine canonical.
#
#   2. `scripts/check-humanize-parity.py` — humanize_verdict /
#      humanize_severity / humanize_review_reason behavioral parity
#      across cli-client, mcp-server, lsp-server, github-action.
#      Compares outputs across 36 input cases per function rather
#      than byte-identity (docstrings legitimately diverge per
#      package).
#
#   3. `tests/test_engine_taxonomy_ts_mirror.py` — pins
#      src/lib/engine-taxonomy.ts CONTENT_TYPES / MOMENTS / AUDIENCES
#      against the Python canonicals (standards_library.json,
#      moments.py, audience.py). Catches the exact drift class that
#      hid `native_mobile` from every product surface for the entire
#      beta-prep window before the gate landed (2026-05-11).
#
# RETIRED 2026-05-16: the JS-preprocessor parity gate
# (`tools/parity_check.py` vs the `runPreprocessor()` block in
# figma-plugin/ui.html) was removed with the Figma plugin (#590).
# There is no JS preprocessor anymore; every surface calls the
# Python engine. The remaining gates are not Figma-related.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a fast-follow push doesn't
# burn minutes on the prior commit.
concurrency:
  group: parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        # The parity checks need the engine package + pytest for the
        # engine-taxonomy mirror gate. Editable install keeps the
        # JSON standards loader pointed at the in-tree library.
        run: pip install -e ".[dev]"

      - name: Fetch substrate
        # The engine-taxonomy mirror gate reads the standards library
        # (standards_library.json) to pin engine-taxonomy.ts. Substrate
        # lives in a private repo per ADR 2026-04-25; the fetch is the
        # same one Vercel runs in `prebuild` (package.json).
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run display-labels parity gate
        # No substrate or pip deps needed — pure regex parse over the
        # four DISPLAY_LABELS sources. Always runs, even if the
        # preprocessor gate is itself skipped.
        run: python3 scripts/check-display-labels-parity.py

      - name: Run humanize parity gate
        # Behavioral, not byte-identity: each package has its own
        # docstrings around the same three functions. The script
        # importlib-loads each humanize.py as an isolated module
        # and asserts they return identical outputs across 36 input
        # cases × 3 functions. Stdlib only.
        run: python3 scripts/check-humanize-parity.py

      - name: Run engine-taxonomy mirror gate
        # Pins src/lib/engine-taxonomy.ts against the Python canonicals.
        # Pytest because the assertion includes useful diff output;
        # the test file is stdlib-only at runtime (regex parse + JSON
        # read + Audience enum + MOMENT_TAXONOMY).
        run: pytest tests/test_engine_taxonomy_ts_mirror.py -v
