name: Substrate-change verification

# Catches breakage in the private substrate (`contentRX-substrate`
# repo) before it reaches a public-repo PR or a Vercel deploy. Fires
# in three modes:
#
#   1. `repository_dispatch` — the substrate repo's own GHA pings
#      this workflow on every push to its main branch. See
#      `docs/substrate-repo-setup.md` for the substrate-side workflow
#      to drop in. Event type: `substrate-changed`.
#
#   2. `schedule` (daily 11:00 UTC) — safety net. Even if the
#      repository_dispatch link breaks (token rotation, network
#      blip), this catches drift within a day.
#
#   3. `workflow_dispatch` — manual trigger from the Actions tab.
#      Useful when Robert's debugging a substrate change locally and
#      wants to confirm public CI agrees before pushing.
#
# What it runs:
#
#   - `scripts/validate-substrate.py` — structural lint (JSON parse,
#     unique IDs, required fields, total_standards math, cross-file
#     ref orphans as warnings). Errors fail the workflow; warnings
#     surface in the log.
#   - The 8 substrate-aware pytest files (the same files that run on
#     every public-repo PR). These are the integration check: does
#     the engine actually behave correctly against this substrate?
#   - The 5-gate parity workflow (re-uses the same logic to confirm
#     TS mirrors haven't drifted from the new substrate content).
#
# What it does NOT run:
#
#   - Full vitest / build / lint. Those are public-PR concerns; a
#     substrate-only change doesn't touch TS/build paths.
#
# On failure: Robert gets a workflow-failure email + a red dot in
# the Actions tab. The fix is a substrate-repo commit reverting or
# correcting the change.

on:
  repository_dispatch:
    types: [substrate-changed]
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: substrate-changed-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Fetch the latest substrate
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Validate substrate structure
        # Pure-JSON validation: unique IDs, required fields, cross-file
        # ref check. Fast — runs before the engine tests so a typo
        # surfaces in 2 seconds instead of after a 30-second pytest run.
        run: python3 scripts/validate-substrate.py

      - name: Run substrate-aware engine tests
        # Sub-selection of the engine suite that actually exercises
        # substrate content (vs. pure pipeline / data-model tests).
        # If you add a new substrate-exercising test, add the file
        # here too.
        run: |
          PYTHONPATH=$(pwd)/src python3 -m pytest \
            tests/test_loader.py \
            tests/test_examples_corpus.py \
            tests/test_check_close_paraphrase.py \
            tests/test_v451_patches.py \
            tests/test_annual_audit.py \
            tests/test_engine_taxonomy_ts_mirror.py \
            tests/test_content_model_mirror.py \
            tests/test_taxonomy_changelog_script.py \
            tests/test_validate_substrate.py \
            -v

      - name: Run parity gates
        # The JS/Python parity gates from .github/workflows/parity.yml,
        # re-run here so substrate-side adds (new content_type, moment,
        # standard) get caught immediately, not waiting for the next
        # public-repo PR.
        run: |
          python3 scripts/check-display-labels-parity.py
          python3 scripts/check-humanize-parity.py
          python3 -m pytest \
            tests/test_moment_metadata_ts_mirror.py \
            tests/test_engine_taxonomy_ts_mirror.py \
            -v
