name: Case-study daily cron

# Daily case-study workflow — picks one target from
# `external_signal/allow_list.json` (deterministic rotation), clones
# it, extracts UI strings, runs them through the local engine, and
# opens a PR with the artifacts under `evals/case-studies/<slug>/`.
#
# Why this exists: the named-expert moat depends on running the engine
# over real OSS products and recording where it agrees with hand
# judgment (and where it doesn't). The picker rotates through the
# allow-list so we don't park on one target. The PR is the human's
# review surface — Robo annotates `notes.md`, files refinement-log
# entries from the inline form on `/admin/case-studies/<slug>`, and
# merges (or closes) per the case-study-approval gate.
#
# Skip behavior: `ANTHROPIC_API_KEY` is required for `--via engine`.
# When the secret is unset, the job emits a notice and exits cleanly
# (mirrors `held_out.yml`). No silent bypass.
#
# Manual dispatch modes:
#   - no inputs       -> daily rotation pick from the allow-list
#   - slug=<allow-list slug>
#                     -> spot-check a rotation target out of cycle
#   - repo=<URL> + paths=<globs>
#                     -> ad-hoc crawl of any repo, no allow-list
#                        membership required. The human is the gate.

on:
  schedule:
    # Daily at 06:00 UTC. Lands well before the morning review window
    # in any major timezone. Same slot as `refinement_candidates.yml`
    # — fine because both jobs are GitHub-side and don't contend.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      slug:
        description: "Allow-list slug for explicit rotation override (e.g. 'mui-material-ui'). Leave blank for daily rotation. Ignored when `repo` is set (or used as the override slug for ad-hoc runs)."
        required: false
        type: string
      repo:
        description: "Ad-hoc repo URL (e.g. https://github.com/stripe/stripe-cli). Set with `paths` to crawl any repo without it being on the allow-list."
        required: false
        type: string
      paths:
        description: "Path globs for `repo`, space-separated (e.g. 'src/**/*.tsx docs/**/*.md'). Required when `repo` is set."
        required: false
        type: string
      limit:
        description: "Max strings to evaluate (0 = no cap). Default 25."
        required: false
        default: "25"
        type: string

concurrency:
  # Per-day key keeps two runs from racing if a manual dispatch fires
  # while the cron is mid-run. Different days never block each other.
  group: case-study-daily-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    name: crawl + evaluate + summarize
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install engine
        # `--via engine` needs the Anthropic SDK; the regex extractor
        # is already vendored under `github-action/src/`.
        run: pip install -e ".[dev]"

      - name: Check API-key availability
        id: keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice ::Case-study cron skipped — set ANTHROPIC_API_KEY to enable. The picker + crawler don't need it, but `--via engine` does, and we don't want to commit half-results."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick today's target
        id: pick
        if: steps.keys.outputs.available == 'true'
        env:
          SLUG_INPUT: ${{ github.event.inputs.slug }}
          REPO_INPUT: ${{ github.event.inputs.repo }}
          PATHS_INPUT: ${{ github.event.inputs.paths }}
        run: |
          set -euo pipefail
          if [ -n "$REPO_INPUT" ]; then
            # Ad-hoc dispatch: skip the allow-list. The picker still
            # produces the JSON shape; we just hand it the URL directly.
            if [ -z "$PATHS_INPUT" ]; then
              echo "::error ::repo input requires paths input too"
              exit 1
            fi
            read -ra PATHS_ARR <<<"$PATHS_INPUT"
            ARGS=(--repo "$REPO_INPUT" --paths-raw "${PATHS_ARR[@]}")
            if [ -n "$SLUG_INPUT" ]; then
              ARGS+=(--slug "$SLUG_INPUT")
            fi
            PICK_JSON="$(python3 tools/case_study_pick.py "${ARGS[@]}")"
          elif [ -n "$SLUG_INPUT" ]; then
            PICK_JSON="$(python3 tools/case_study_pick.py --slug "$SLUG_INPUT")"
          else
            PICK_JSON="$(python3 tools/case_study_pick.py)"
          fi
          echo "$PICK_JSON" | jq .
          {
            echo "slug=$(echo "$PICK_JSON" | jq -r .slug)"
            echo "repo=$(echo "$PICK_JSON" | jq -r .repo)"
            echo "owner=$(echo "$PICK_JSON" | jq -r .owner)"
            echo "name=$(echo "$PICK_JSON" | jq -r .name)"
            echo "paths=$(echo "$PICK_JSON" | jq -r '.paths | join(" ")')"
            echo "today=$(date -u +%Y-%m-%d)"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Today's target"
            echo ""
            echo "- **slug:** \`$(echo "$PICK_JSON" | jq -r .slug)\`"
            echo "- **repo:** $(echo "$PICK_JSON" | jq -r .repo)"
            echo "- **license:** $(echo "$PICK_JSON" | jq -r '.license // "ad-hoc"')"
            echo "- **reason:** $(echo "$PICK_JSON" | jq -r .reason)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Crawl
        if: steps.keys.outputs.available == 'true'
        env:
          SLUG: ${{ steps.pick.outputs.slug }}
          REPO: ${{ steps.pick.outputs.repo }}
          PATHS: ${{ steps.pick.outputs.paths }}
        run: |
          set -euo pipefail
          # `--paths` is `nargs='+'` so unquoted expansion is correct.
          # shellcheck disable=SC2086
          python3 tools/case_study.py crawl \
            --slug "$SLUG" \
            --repo "$REPO" \
            --paths $PATHS \
            --refresh

      - name: Evaluate (--via engine)
        if: steps.keys.outputs.available == 'true'
        env:
          SLUG: ${{ steps.pick.outputs.slug }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit || '25' }}
        run: |
          set -euo pipefail
          python3 tools/case_study.py evaluate \
            --slug "$SLUG" \
            --via engine \
            --limit "$LIMIT"

      - name: Summarize
        if: steps.keys.outputs.available == 'true'
        env:
          SLUG: ${{ steps.pick.outputs.slug }}
        run: |
          set -euo pipefail
          python3 tools/case_study.py summarize --slug "$SLUG"
          {
            echo ""
            echo "## Run summary"
            echo ""
            echo '```'
            cat "evals/case-studies/$SLUG/summary.md"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open PR with case-study artifacts
        if: steps.keys.outputs.available == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Day-stamped branch so two runs on the same day re-use the
          # same PR (peter-evans updates the existing PR on rerun);
          # different days open distinct PRs Robo can triage in batch.
          branch: case-study/${{ steps.pick.outputs.slug }}-${{ steps.pick.outputs.today }}
          base: main
          commit-message: "chore(case-study): daily crawl of ${{ steps.pick.outputs.slug }}"
          title: "chore(case-study): daily crawl of ${{ steps.pick.outputs.slug }}"
          body: |
            Auto-generated by `.github/workflows/case_study_daily.yml`.

            Daily case-study run for **${{ steps.pick.outputs.slug }}**
            (${{ steps.pick.outputs.repo }}).

            ## What's in this PR

            - `evals/case-studies/${{ steps.pick.outputs.slug }}/extracted_strings.jsonl`
              — raw strings from the regex extractor.
            - `evals/case-studies/${{ steps.pick.outputs.slug }}/engine_results.jsonl`
              — engine public envelope per evaluated string.
            - `evals/case-studies/${{ steps.pick.outputs.slug }}/summary.md`
              — auto-rolled stats (verdict counts, severity, top
              review-reasons).
            - `evals/case-studies/${{ steps.pick.outputs.slug }}/README.md`
              — per-target metadata + workflow notes.

            ## Reviewer notes

            1. Skim `summary.md` first.
            2. Browse `engine_results.jsonl` row-by-row at
               `/admin/case-studies/${{ steps.pick.outputs.slug }}` —
               that surface has the inline "Log refinement" form for
               candidates worth filing.
            3. Hand-write observations into `notes.md` (optional, but
               that's the moat artifact).
            4. Merge if the run looks healthy; close (without merge)
               if the regex extractor produced too much noise to be
               useful — that's a signal to tighten `_likely_real_copy`,
               not an engine problem.

            The case-study-approval gate (`case_study_approval.yml`)
            does NOT block this PR — that gate guards the public
            docs-site registry, not the substrate artifacts under
            `evals/case-studies/`.
          labels: |
            case-study
            automated
          delete-branch: true
