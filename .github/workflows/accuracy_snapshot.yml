name: Accuracy snapshot (nightly)

# Phase C4 — nightly cron for the accuracy snapshot generator. Runs
# `reports/accuracy/generate.py` against the committed substrate
# (evals/graduation/readiness.json + evals/drift/reports/*.json) and
# opens a PR with the refreshed reports/accuracy/latest.json so the
# docs site picks it up on next deploy.
#
# Opens a PR rather than committing directly to main so every public
# number passes through the founder publication gate at
# /admin/reports — the operational checkpoint that prevents an
# automation bug from publishing the wrong κ.

on:
  schedule:
    # 03:00 UTC nightly. Late enough that any same-day commits to
    # readiness.json have settled; early enough that the resulting PR
    # lands before the day's review rhythm.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: accuracy-snapshot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: regenerate reports/accuracy/latest.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Run accuracy generator
        run: python3 reports/accuracy/generate.py

      - name: Save prior-week snapshot for the calibration log delta
        # The weekly calibration log generator
        # (reports/calibration/generate.py) reads the prior week's
        # snapshot at reports/accuracy/YYYY-WW.json to compute the κ
        # delta line. Without this step only `latest.json` exists and
        # the delta always renders "no prior week to compare against."
        # ISO week (`%G-%V`) is used so the calibration lookup
        # matches.
        run: |
          ISO_WEEK=$(date -u +%G-%V)
          cp reports/accuracy/latest.json "reports/accuracy/${ISO_WEEK}.json"

      - name: Open PR if snapshot changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/accuracy-snapshot
          commit-message: "chore(reports): refresh nightly accuracy snapshot"
          title: "chore(reports): refresh nightly accuracy snapshot"
          body: |
            Auto-generated by `.github/workflows/accuracy_snapshot.yml`.

            Runs `reports/accuracy/generate.py` against the committed
            substrate and updates `reports/accuracy/latest.json`. The
            file is the public artifact the docs site renders for
            `/accuracy`.

            Approve to publish the new κ; close to drop the run.
            `/admin/reports` is the founder-side preview gate.
          labels: |
            reports
            accuracy
            auto-generated
          delete-branch: true
