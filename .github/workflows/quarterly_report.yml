name: Quarterly report scaffold (first Monday of quarter)

# Phase C4 — quarterly cron for the report scaffold generator. The
# architecture doc calls for "first Monday of each quarter"; cron
# can't express that directly, so the workflow runs every Monday in
# January / April / July / October and the first step exits cleanly
# on Mondays that aren't the first one of the quarter.
#
# Opens a PR with that quarter's `reports/quarterly/YYYY-Q.md`. The
# scaffold has all numbers populated; the founder hand-edits the
# Executive summary / What we got wrong / What's next sections
# before publishing.

on:
  schedule:
    # Every Monday at 14:00 UTC in the four quarter-start months.
    # The "first-Monday-of-quarter" check lives in the first step.
    - cron: "0 14 * 1,4,7,10 1"
  workflow_dispatch:

concurrency:
  group: quarterly-report-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: regenerate this quarter's scaffold
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check if today is the first Monday of the quarter
        id: gate
        run: |
          today=$(date -u +%Y-%m-%d)
          dom=$(date -u +%-d)
          if [ "$dom" -le 7 ]; then
            echo "::notice ::First Monday of the quarter ($today). Generating scaffold."
            echo "is_first_monday=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice ::$today is a Monday but not the first of the quarter — skipping."
            echo "is_first_monday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.is_first_monday == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Run quarterly generator
        if: steps.gate.outputs.is_first_monday == 'true'
        run: python3 reports/quarterly/generate.py

      - name: Open PR if scaffold changed
        if: steps.gate.outputs.is_first_monday == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/quarterly-report
          commit-message: "chore(reports): quarterly accuracy report scaffold"
          title: "chore(reports): quarterly accuracy report scaffold"
          body: |
            Auto-generated by `.github/workflows/quarterly_report.yml`.

            Runs `reports/quarterly/generate.py` on the first Monday
            of each quarter. The scaffold populates every number from
            substrate + the calibration trajectory; the Executive
            summary / What we got wrong / What's next sections render
            as `_TODO: …_` blockquotes for hand-editing.

            **Don't merge as-is.** Edit the narrative sections before
            approving — the named-expert moat depends on rigor in the
            numbers AND voice in the narrative.
          labels: |
            reports
            quarterly
            auto-generated
            needs-narrative
          delete-branch: true
