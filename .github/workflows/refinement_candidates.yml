name: Refinement candidate detection

# Human-eval build plan Session 34. Nightly job that fetches the
# aggregated signal dump from the production admin endpoint and runs
# `tools/refinement_candidate_detector.py` to propose candidate
# entries in `taxonomy_refinement_log.md`. Opens a PR with the
# updated log so Robo can triage during the weekly review rhythm.
#
# Opt-in: the job is skipped unless both REFINEMENT_SIGNALS_URL and
# REFINEMENT_SIGNALS_TOKEN secrets are configured. Same safety-first
# convention the held-out gate uses (Session 6). No silent bypass —
# missing secrets emit a notice so the absence is visible.

on:
  schedule:
    # Nightly at 06:00 UTC. Early enough that the resulting PR lands
    # well before Robo's weekly review rhythm; late enough that the
    # day's override stream has settled.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: refinement-candidates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: detect refinement candidates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check signal-source availability
        id: signals
        env:
          REFINEMENT_SIGNALS_URL: ${{ secrets.REFINEMENT_SIGNALS_URL }}
          REFINEMENT_SIGNALS_TOKEN: ${{ secrets.REFINEMENT_SIGNALS_TOKEN }}
        run: |
          if [ -z "$REFINEMENT_SIGNALS_URL" ] || [ -z "$REFINEMENT_SIGNALS_TOKEN" ]; then
            echo "::notice ::Refinement-candidate detection skipped — configure REFINEMENT_SIGNALS_URL and REFINEMENT_SIGNALS_TOKEN secrets to enable. See ARCHITECTURE.md."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch signal dump
        if: steps.signals.outputs.available == 'true'
        env:
          REFINEMENT_SIGNALS_URL: ${{ secrets.REFINEMENT_SIGNALS_URL }}
          REFINEMENT_SIGNALS_TOKEN: ${{ secrets.REFINEMENT_SIGNALS_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $REFINEMENT_SIGNALS_TOKEN" \
            "$REFINEMENT_SIGNALS_URL" \
            --output /tmp/refinement_signals.json
          # Minimal sanity check: the dump must be JSON with at least
          # the `generated_at` key.
          python3 -c "import json; j=json.load(open('/tmp/refinement_signals.json')); assert 'generated_at' in j, 'missing generated_at'"

      - name: Run detector
        if: steps.signals.outputs.available == 'true'
        run: |
          python3 tools/refinement_candidate_detector.py \
            --signals /tmp/refinement_signals.json \
            --log taxonomy_refinement_log.md

      - name: Open PR if log changed
        if: steps.signals.outputs.available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refinement-candidates
          commit-message: "chore(taxonomy): refresh auto-detected refinement candidates"
          title: "chore(taxonomy): refresh auto-detected refinement candidates"
          body: |
            Auto-generated by `.github/workflows/refinement_candidates.yml`.

            Runs `tools/refinement_candidate_detector.py` against the
            nightly signal dump and updates the `## Proposed refinements
            (auto-detected)` section of `taxonomy_refinement_log.md`.

            Triage these during the weekly review rhythm. Approved
            candidates move to `## Approved refinements`; declined ones
            move to `## Declined refinements` with a reason.
          labels: |
            taxonomy
            auto-detected
          delete-branch: true
