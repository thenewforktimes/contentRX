name: Refinement candidate detection

# DISABLED 2026-04-29 — operates on private substrate.
#
# Per ADR 2026-04-25 and the 2026-04-29 substrate-hosting move, the
# refinement log lives in `_private/taxonomy_refinement_log.md`
# (gitignored). This workflow used to write to that file in the public
# repo and open a PR; now the file isn't tracked here, so the workflow
# would either fail at the `create-pull-request` step or commit a
# gitignored file (silently dropped). The substrate-side automation
# belongs in the private substrate repo, not here.
#
# Kept as documentation. Do not re-enable without the substrate moving
# back to the public tree (which would require superseding ADR
# 2026-04-25).

on:
  workflow_dispatch:  # manual only — schedule removed

concurrency:
  group: refinement-candidates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: detect refinement candidates
    runs-on: ubuntu-latest
    if: false  # disabled — substrate is private (see header)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Check signal-source availability
        id: signals
        env:
          REFINEMENT_SIGNALS_URL: ${{ secrets.REFINEMENT_SIGNALS_URL }}
          REFINEMENT_SIGNALS_TOKEN: ${{ secrets.REFINEMENT_SIGNALS_TOKEN }}
        run: |
          if [ -z "$REFINEMENT_SIGNALS_URL" ] || [ -z "$REFINEMENT_SIGNALS_TOKEN" ]; then
            echo "::notice ::Refinement-candidate detection skipped — configure REFINEMENT_SIGNALS_URL and REFINEMENT_SIGNALS_TOKEN secrets to enable."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch signal dump
        if: steps.signals.outputs.available == 'true'
        env:
          REFINEMENT_SIGNALS_URL: ${{ secrets.REFINEMENT_SIGNALS_URL }}
          REFINEMENT_SIGNALS_TOKEN: ${{ secrets.REFINEMENT_SIGNALS_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $REFINEMENT_SIGNALS_TOKEN" \
            "$REFINEMENT_SIGNALS_URL" \
            --output /tmp/refinement_signals.json
          # Minimal sanity check: the dump must be JSON with at least
          # the `generated_at` key.
          python3 -c "import json; j=json.load(open('/tmp/refinement_signals.json')); assert 'generated_at' in j, 'missing generated_at'"

      - name: Run detector
        if: steps.signals.outputs.available == 'true'
        run: |
          python3 tools/refinement_candidate_detector.py \
            --signals /tmp/refinement_signals.json \
            --log taxonomy_refinement_log.md

      - name: Open PR if log changed
        if: steps.signals.outputs.available == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refinement-candidates
          commit-message: "chore(taxonomy): refresh auto-detected refinement candidates"
          title: "chore(taxonomy): refresh auto-detected refinement candidates"
          body: |
            Auto-generated by `.github/workflows/refinement_candidates.yml`.

            Runs `tools/refinement_candidate_detector.py` against the
            nightly signal dump and updates the `## Proposed refinements
            (auto-detected)` section of `taxonomy_refinement_log.md`.

            Triage these during the weekly review rhythm. Approved
            candidates move to `## Approved refinements`; declined ones
            move to `## Declined refinements` with a reason.
          labels: |
            taxonomy
            auto-detected
          delete-branch: true
