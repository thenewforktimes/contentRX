name: ContentRX
description: Lint UI copy in pull requests against the ContentRX content standards.
author: ContentRX
branding:
  icon: edit-3
  color: blue

inputs:
  api-key:
    description: >-
      ContentRX API key. Generate one at https://contentrx.io/dashboard.
      Pass it as a repository secret, never inline.
    required: true

  strict:
    description: >-
      When true, fails the check if any violations are found. When false
      (default), violations are reported as a PR comment but the check
      passes. Flip to true once your team has triaged and resolved any
      pre-existing violations.
    required: false
    default: 'false'

  fail-on:
    description: >-
      Which verdict states fail the check (BUILD_PLAN_v2 Session 10
      three-state verdict). One of:
        violation  - default. Fails on hard violations only;
                     review_recommended findings show in the comment
                     as warnings but don't fail CI.
        review     - Fails on either review_recommended OR violation.
                     Strictest setting; pick this once your team
                     trusts the calibrated REVIEW signal.
        none       - Never fails (advisory-only).
      Note: `strict: true` is the v1.0 toggle and forces fail-on=violation
      when set, for backward compatibility.
    required: false
    default: 'violation'

  content-type:
    description: >-
      Default content_type hint sent to the API when the extractor can't
      infer one. One of: button_cta, error_message, confirmation,
      tooltip_microcopy, ui_label, short_ui_copy, long_form_copy, heading.
    required: false
    default: short_ui_copy

  paths:
    description: >-
      Glob pattern (picomatch / fnmatch syntax) for files to check. Only
      files matching this AND changed in the PR are extracted.
    required: false
    default: '**/*.{tsx,jsx,html}'

  api-url:
    description: >-
      Override the ContentRX API base URL. Useful for self-hosted or
      staging deployments. Leave blank for production.
    required: false
    default: ''

  max-checks:
    description: >-
      Maximum number of strings to send to ContentRX in a single PR.
      Above the cap, the action checks the first N strings and posts
      a notice in the PR comment that the remaining N were skipped.
      Default 200, which fits the typical content-PR shape and stays
      well below the Pro 5,000-checks-per-month quota even on
      busy repos. Bump this for codebase-wide audits or set very
      high (e.g., 100000) for unbounded behavior.
    required: false
    default: '200'

outputs:
  violations:
    description: Total violation count across all extracted strings.
  reviews:
    description: >-
      Count of strings flagged as "review_recommended" (v1.1.0 verdict).
      Zero on older API versions that don't return verdict.
  passed:
    description: >-
      "true" when no findings caused failure under the active fail-on
      setting; "false" otherwise.

runs:
  using: docker
  image: Dockerfile
  env:
    CONTENTRX_API_KEY: ${{ inputs.api-key }}
    CONTENTRX_API_URL: ${{ inputs.api-url }}
    CONTENTRX_STRICT: ${{ inputs.strict }}
    CONTENTRX_FAIL_ON: ${{ inputs.fail-on }}
    CONTENTRX_CONTENT_TYPE: ${{ inputs.content-type }}
    CONTENTRX_PATHS: ${{ inputs.paths }}
    CONTENTRX_MAX_CHECKS: ${{ inputs.max-checks }}
